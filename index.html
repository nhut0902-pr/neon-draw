<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Neon Draw Pro — Professional Gesture Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
/* ═══════ DESIGN SYSTEM ═══════ */
:root {
  --bg: #0a0a0c;
  --surface: rgba(20, 20, 23, 0.7);
  --surface-solid: #141417;
  --primary: #3b82f6;
  --primary-glow: rgba(59, 130, 246, 0.5);
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --border: rgba(255, 255, 255, 0.08);
  --radius-lg: 20px;
  --radius-md: 12px;
  --font-sans: 'Inter', sans-serif;
  --font-display: 'Outfit', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: var(--bg); color: var(--text); 
  font-family: var(--font-sans); touch-action: none;
}

/* ═══════ LANDING PAGE ═══════ */
#landing {
  position: fixed; inset: 0; z-index: 2000;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
#landing.hide { opacity: 0; pointer-events: none; transform: scale(1.05); }

.landing-bg { position: absolute; inset: 0; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: orbFloat 12s ease-in-out infinite; }
.orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
.orb-2 { width: 300px; height: 300px; background: #ec4899; bottom: -50px; right: -50px; animation-delay: -4s; }
@keyframes orbFloat { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px, 20px) scale(1.1); } }

#landing-particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

.hero { position: relative; z-index: 2; text-align: center; max-width: 640px; padding: 0 24px; }
.hero h1 { 
  font-family: var(--font-display); font-size: clamp(40px, 8vw, 72px); 
  font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 24px;
  background: linear-gradient(to bottom, #fff 30%, #94a3b8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 18px; color: var(--text-muted); line-height: 1.6; margin-bottom: 48px; }

.btn-primary {
  background: var(--text); color: var(--bg);
  padding: 16px 40px; border-radius: 100px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; display: inline-flex; align-items: center; gap: 12px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.3); }

/* ═══════ APP INTERFACE ═══════ */
#app { position: fixed; inset: 0; z-index: 1; display: none; }
#app.show { display: block; }

#cam { 
  position: fixed; inset: 0; width: 100%; height: 100%; 
  object-fit: cover; transform: scaleX(-1); opacity: 0.3; 
  filter: contrast(1.1) brightness(0.8);
}
#draw-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

/* HUD Layout */
.hud {
  position: fixed; inset: 0; z-index: 100; pointer-events: none;
  padding: 24px; display: flex; flex-direction: column; justify-content: space-between;
}

.glass {
  background: var(--surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border); pointer-events: auto;
}

/* Top Bar */
.top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
.brand { 
  display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-radius: 100px;
  font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: 0.02em;
}
.brand svg { color: var(--primary); }

.action-group { display: flex; gap: 8px; padding: 6px; border-radius: 100px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: transparent; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.icon-btn:hover { background: rgba(255,255,255,0.1); }
.icon-btn svg { width: 20px; height: 20px; stroke-width: 2; }
.icon-btn.danger:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

/* Bottom Controls */
.bottom-controls { display: flex; justify-content: center; align-items: flex-end; gap: 24px; width: 100%; }

.tool-dock { 
  display: flex; gap: 12px; padding: 8px; border-radius: 24px; 
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.tool-item {
  width: 52px; height: 52px; border-radius: 18px; border: none;
  background: transparent; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.3s;
}
.tool-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tool-item.active { background: var(--primary); color: white; box-shadow: 0 8px 16px var(--primary-glow); }

.color-palette {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 12px; border-radius: 24px;
}
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s; position: relative;
}
.color-dot.active { border-color: white; transform: scale(1.15); }
.color-dot.active::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
}

/* Status & Feedback */
.status-pill {
  position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
  padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }

/* ═══════ OVERLAYS ═══════ */
#loading {
  position: fixed; inset: 0; z-index: 3000; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.loader {
  width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
  border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface-solid); border: 1px solid var(--border);
  padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <p style="margin-top: 24px; font-size: 14px; color: var(--text-muted); letter-spacing: 0.1em">INITIALIZING ENGINE</p>
</div>

<div id="landing">
  <div class="landing-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <canvas id="landing-particles"></canvas>
  <div class="hero">
    <h1>Sáng tạo không<br>cần chạm.</h1>
    <p>Neon Draw Pro sử dụng AI để biến cử chỉ tay của bạn thành những nét vẽ nghệ thuật trong không gian thực tế ảo.</p>
    <button class="btn-primary" id="btn-start">
      Bắt đầu ngay
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>
  </div>
</div>

<div id="app">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="draw-canvas"></canvas>

  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Hệ thống sẵn sàng</span>
  </div>

  <div class="hud">
    <div class="top-bar">
      <div class="glass brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        NEON DRAW PRO
      </div>
      <div class="glass action-group">
        <button class="icon-btn" id="btn-undo" title="Hoàn tác">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 10h10a8 8 0 0 1 8 8v2M3 10l6-6m-6 6 6 6"/></svg>
        </button>
        <button class="icon-btn danger" id="btn-clear" title="Xóa tất cả">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>
        </button>
        <button class="icon-btn" id="btn-save" title="Lưu tác phẩm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        </button>
      </div>
    </div>

    <div class="bottom-controls">
      <div class="glass color-palette" id="color-picker">
        <!-- Colors via JS -->
      </div>
      <div class="glass tool-dock">
        <button class="tool-item active" id="mode-draw" title="Chế độ vẽ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5zM2 2l5 5"/></svg>
        </button>
        <button class="tool-item" id="mode-erase" title="Chế độ tẩy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17L7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast">Đã lưu ảnh thành công</div>

<script>
const COLORS = ['#3b82f6', '#8b5cf6', '#ec4899', '#ef4444', '#f59e0b', '#10b981', '#06b6d4', '#ffffff', '#64748b', '#000000'];
let currentColor = COLORS[0];
let currentSize = 6;
let isEraser = false;
let strokes = [], sparks = [], shards = [];
let movingStroke = -1, moveAnchor = null;
let W, H, cvs, ctx;
let mpHands = null;

// ───────── INITIALIZATION ─────────
window.onload = () => {
  cvs = document.getElementById('draw-canvas');
  ctx = cvs.getContext('2d');
  resize();
  initUI();
  initLandingParticles();
  
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
  }, 1200);
};

function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
window.onresize = resize;

function initUI() {
  const picker = document.getElementById('color-picker');
  COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = `color-dot ${i === 0 ? 'active' : ''}`;
    dot.style.backgroundColor = c;
    dot.onclick = () => selectColor(c, dot);
    picker.appendChild(dot);
  });

  document.getElementById('btn-start').onclick = startApp;
  document.getElementById('btn-undo').onclick = undo;
  document.getElementById('btn-clear').onclick = clearCanvas;
  document.getElementById('btn-save').onclick = saveImage;
  document.getElementById('mode-draw').onclick = () => setMode(false);
  document.getElementById('mode-erase').onclick = () => setMode(true);
}

function selectColor(c, el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  if(el) el.classList.add('active');
  currentColor = c;
  setMode(false);
}

function setMode(erase) {
  isEraser = erase;
  document.getElementById('mode-draw').classList.toggle('active', !erase);
  document.getElementById('mode-erase').classList.toggle('active', erase);
  updateStatus(erase ? "Chế độ tẩy" : "Chế độ vẽ");
}

function updateStatus(text) {
  document.getElementById('status-text').innerText = text;
}

// ───────── LANDING PARTICLES ─────────
function initLandingParticles() {
  const lc = document.getElementById('landing-particles');
  const lx = lc.getContext('2d');
  let lW, lH;
  const dots = [];
  
  function res() { lW = lc.width = window.innerWidth; lH = lc.height = window.innerHeight; }
  res(); window.addEventListener('resize', res);

  for(let i=0; i<40; i++) {
    dots.push({
      x: Math.random()*lW, y: Math.random()*lH,
      vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
      r: Math.random()*2, a: Math.random()*0.3 + 0.1
    });
  }

  function anim() {
    if(document.getElementById('landing').classList.contains('hide')) return;
    lx.clearRect(0,0,lW,lH);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if(d.x<0) d.x=lW; if(d.x>lW) d.x=0;
      if(d.y<0) d.y=lH; if(d.y>lH) d.y=0;
      lx.fillStyle = `rgba(255,255,255,${d.a})`;
      lx.beginPath(); lx.arc(d.x, d.y, d.r, 0, Math.PI*2); lx.fill();
    });
    requestAnimationFrame(anim);
  }
  anim();
}

// ───────── CORE LOGIC ─────────
async function startApp() {
  document.getElementById('landing').classList.add('hide');
  document.getElementById('app').classList.add('show');
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
    document.getElementById('cam').srcObject = stream;
    initMediaPipe();
  } catch (err) {
    alert("Vui lòng cấp quyền truy cập camera.");
  }
}

function initMediaPipe() {
  mpHands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
  mpHands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
  mpHands.onResults(onResults);

  const camera = new Camera(document.getElementById('cam'), {
    onFrame: async () => { await mpHands.send({ image: document.getElementById('cam') }); },
    width: 1280, height: 720
  });
  camera.start();
}

function onResults(results) {
  ctx.clearRect(0, 0, W, H);
  
  // Update particles
  sparks = sparks.filter(s => {
    s.x += s.vx; s.y += s.vy; s.life -= 0.02;
    return s.life > 0;
  });
  shards = shards.filter(s => {
    s.x += s.vx; s.y += s.vy; s.rot += s.vr; s.life -= 0.015;
    return s.life > 0;
  });

  drawStrokes();
  drawParticles();

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    const indexTip = landmarks[8];
    const thumbTip = landmarks[4];
    const middleTip = landmarks[12];
    
    const x = (1 - indexTip.x) * W;
    const y = indexTip.y * H;

    // Pinch logic (Move)
    const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
    const isPinching = pinchDist < 0.06;
    
    // Drawing logic
    const isDrawing = indexTip.y < landmarks[6].y && middleTip.y > landmarks[10].y;
    
    // Fist logic (Clear)
    const isFist = landmarks[8].y > landmarks[6].y && landmarks[12].y > landmarks[10].y && landmarks[16].y > landmarks[14].y;

    if (isFist) {
      if(strokes.length > 0) explodeAll();
      clearCanvas();
      updateStatus("Đã xóa sạch");
    } else if (isPinching && !isDrawing) {
      handleMove(x, y);
      updateStatus("Đang di chuyển...");
    } else if (isDrawing) {
      movingStroke = -1; moveAnchor = null;
      handleDraw(x, y);
      updateStatus(isEraser ? "Đang tẩy..." : "Đang vẽ...");
    } else {
      currentStroke = null;
      movingStroke = -1; moveAnchor = null;
      updateStatus("Sẵn sàng");
    }

    drawCursor(x, y, isDrawing, isPinching);
  }
}

function handleDraw(x, y) {
  if (!currentStroke) {
    currentStroke = { color: isEraser ? '#0a0a0c' : currentColor, size: currentSize, points: [], isEraser };
    strokes.push(currentStroke);
  }
  currentStroke.points.push({ x, y });
  
  // Add sparks
  if(!isEraser) {
    for(let i=0; i<2; i++) {
      sparks.push({
        x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
        life: 1, color: currentColor
      });
    }
  }
}

function handleMove(x, y) {
  if (movingStroke === -1) {
    let minDist = 50;
    strokes.forEach((s, idx) => {
      s.points.forEach(p => {
        let d = Math.hypot(p.x - x, p.y - y);
        if (d < minDist) { minDist = d; movingStroke = idx; }
      });
    });
    if (movingStroke !== -1) moveAnchor = { x, y };
  } else {
    let dx = x - moveAnchor.x, dy = y - moveAnchor.y;
    strokes[movingStroke].points.forEach(p => { p.x += dx; p.y += dy; });
    moveAnchor = { x, y };
  }
}

function explodeAll() {
  strokes.forEach(s => {
    s.points.forEach(p => {
      if(Math.random() > 0.8) {
        shards.push({
          x: p.x, y: p.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
          rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.2,
          life: 1, color: s.color, sz: Math.random()*4+2
        });
      }
    });
  });
}

function drawCursor(x, y, active, pinching) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, active ? 8 : (pinching ? 6 : 12), 0, Math.PI * 2);
  ctx.strokeStyle = active || pinching ? '#fff' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  if (active) {
    ctx.fillStyle = isEraser ? '#fff' : currentColor;
    ctx.fill();
    ctx.shadowBlur = 15; ctx.shadowColor = isEraser ? '#fff' : currentColor;
    ctx.stroke();
  }
  if (pinching) {
    ctx.fillStyle = '#fff'; ctx.fill();
  }
  ctx.restore();
}

function drawStrokes() {
  strokes.forEach(s => {
    if (s.points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) {
      ctx.lineTo(s.points[i].x, s.points[i].y);
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = s.size; ctx.strokeStyle = s.color;
    if (!s.isEraser) { ctx.shadowBlur = 12; ctx.shadowColor = s.color; }
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
}

function drawParticles() {
  sparks.forEach(s => {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x, s.y, 2, 2);
  });
  shards.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.fillStyle = s.color;
    ctx.fillRect(-s.sz/2, -s.sz/2, s.sz, s.sz);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function undo() { strokes.pop(); showToast("Đã hoàn tác"); }
function clearCanvas() { strokes = []; }
function saveImage() {
  const link = document.createElement('a');
  link.download = `neon-draw-pro-${Date.now()}.png`;
  link.href = cvs.toDataURL();
  link.click();
  showToast("Đã lưu ảnh thành công");
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
